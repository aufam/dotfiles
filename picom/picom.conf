backend = "glx";             # better performance
vsync = true;

# Corner
corner-radius = 10

# Opacity rules
inactive-opacity = 0.9;
active-opacity = 1.0;
inactive-opacity-override = false;

# Fading
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

# Shadow
shadow = true;
shadow-radius = 12;

# Blur
blur:
{
  method = "dual_kawase";
  strength = 5;
};

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
